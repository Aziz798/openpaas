services:
  postgres:
    image: postgres:17.2
    container_name: openpaas-db
    environment:
      POSTGRES_USER: ${BD_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
    driver: local